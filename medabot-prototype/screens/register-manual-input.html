<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Register – Manual Input – MedaBot</title>
  <link rel="stylesheet" href="../css/tokens.css" />
  <link rel="stylesheet" href="../css/components.css" />
  <link rel="stylesheet" href="../css/register-medication.css" />
</head>
<body>
  <div class="phone-stage">
    <div class="phone">

      <div class="status-bar">
        <span class="time">9:41</span>
        <div class="levels">
          <svg viewBox="0 0 19 12" fill="currentColor"><rect x="0" y="7" width="3" height="5" rx="1"/><rect x="4.5" y="5" width="3" height="7" rx="1"/><rect x="9" y="3" width="3" height="9" rx="1"/><rect x="13.5" y="0" width="3" height="12" rx="1"/></svg>
          <svg viewBox="0 0 17 12" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M0.5 4.5 a12 12 0 0 1 16 0"/><path d="M3 7 a8 8 0 0 1 11 0"/><path d="M5.5 9.5 a4 4 0 0 1 6 0"/><circle cx="8.5" cy="11" r="1" fill="currentColor"/></svg>
          <svg viewBox="0 0 27 13" fill="none" stroke="currentColor"><rect x="0.5" y="0.5" width="22" height="12" rx="3"/><rect x="2" y="2" width="19" height="9" rx="1.5" fill="currentColor"/><rect x="23.5" y="4" width="2.5" height="5" rx="1" fill="currentColor"/></svg>
        </div>
      </div>

      <div class="top-bar">
        <a href="sign-up-register-medication.html" class="back-btn" aria-label="back">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18 L9 12 L15 6"/></svg>
        </a>
      </div>

      <main class="auth">
        <h1>Medication details.</h1>
        <p class="lead">Register the requested medication information.</p>

        <form class="form" onsubmit="event.preventDefault(); window.location='register-manual-input-filled.html'">
          <div class="form-field">
            <label class="label">Medication name</label>
            <input class="input" placeholder="Ex: Ben-U-Ron" />
          </div>
          <div class="two-col">
            <div class="form-field">
              <label class="label">Dosage</label>
              <div class="dose-input placeholder">
                <span>--mg</span>
                <svg class="chev" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6 15 L12 9 L18 15"/></svg>
              </div>
            </div>
            <div class="form-field">
              <label class="label">Dosage form</label>
              <div class="dose-input placeholder">
                <span>Pill</span>
                <svg class="chev" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9 L12 15 L18 9"/></svg>
              </div>
            </div>
          </div>
        </form>
      </main>

      <button class="btn btn-disabled" disabled style="position:absolute;left:16px;right:16px;bottom:42px;">Continue</button>

      <div class="home-indicator"></div>
    </div>
  </div>
</body>
</html>
