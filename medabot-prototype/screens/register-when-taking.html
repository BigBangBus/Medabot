<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Register – When are you going to take it – MedaBot</title>
  <link rel="stylesheet" href="../css/tokens.css" />
  <link rel="stylesheet" href="../css/components.css" />
  <link rel="stylesheet" href="../css/register-medication.css" />
</head>
<body>
  <div class="phone-stage">
    <div class="phone">

      <div class="status-bar">
        <span class="time">9:41</span>
        <div class="levels">
          <svg viewBox="0 0 19 12" fill="currentColor"><rect x="0" y="7" width="3" height="5" rx="1"/><rect x="4.5" y="5" width="3" height="7" rx="1"/><rect x="9" y="3" width="3" height="9" rx="1"/><rect x="13.5" y="0" width="3" height="12" rx="1"/></svg>
          <svg viewBox="0 0 17 12" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M0.5 4.5 a12 12 0 0 1 16 0"/><path d="M3 7 a8 8 0 0 1 11 0"/><path d="M5.5 9.5 a4 4 0 0 1 6 0"/><circle cx="8.5" cy="11" r="1" fill="currentColor"/></svg>
          <svg viewBox="0 0 27 13" fill="none" stroke="currentColor"><rect x="0.5" y="0.5" width="22" height="12" rx="3"/><rect x="2" y="2" width="19" height="9" rx="1.5" fill="currentColor"/><rect x="23.5" y="4" width="2.5" height="5" rx="1" fill="currentColor"/></svg>
        </div>
      </div>

      <div class="top-bar">
        <a href="register-manual-input-filled.html" class="back-btn" aria-label="back">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18 L9 12 L15 6"/></svg>
        </a>
      </div>

      <main class="auth">
        <h1>When are you going to take it?</h1>
        <p class="lead">Choose a frequency below.</p>

        <div class="freq-card">
          <div class="freq-head">
            <div class="ic"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="9" r="3"/><path d="M5 20 c0-4 3-7 7-7 s7 3 7 7"/></svg></div>
            <div class="body">
              <div class="ttl">As needed</div>
              <div class="sub">Only when needed. No set<br>schedule</div>
            </div>
            <span class="check-empty"></span>
          </div>
        </div>

        <a href="register-when-taking-manual.html" class="freq-card" style="text-decoration:none">
          <div class="freq-head">
            <div class="ic"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="4" y="5" width="16" height="14" rx="2"/><path d="M4 10 H20 M9 3 V7 M15 3 V7"/></svg></div>
            <div class="body">
              <div class="ttl">Everyday</div>
              <div class="sub">Only when needed. No set<br>schedule</div>
            </div>
            <svg class="chev-down" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9 L12 15 L18 9"/></svg>
          </div>
        </a>

        <a href="register-when-taking-manual.html" class="freq-card" style="text-decoration:none">
          <div class="freq-head">
            <div class="ic"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="4" y="5" width="16" height="14" rx="2"/><path d="M4 10 H20 M9 3 V7 M15 3 V7"/></svg></div>
            <div class="body">
              <div class="ttl">Every few days</div>
              <div class="sub">Example: Every two days.</div>
            </div>
            <svg class="chev-down" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9 L12 15 L18 9"/></svg>
          </div>
        </a>

        <a href="register-when-taking-manual.html" class="freq-card" style="text-decoration:none">
          <div class="freq-head">
            <div class="ic"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 12 a8 8 0 0 1 14-5 M20 12 a8 8 0 0 1 -14 5"/><path d="M18 3 v4 h-4 M6 21 v-4 h4"/></svg></div>
            <div class="body">
              <div class="ttl">Cycle</div>
              <div class="sub">Example: Every 21 days and stop<br>for 7 days.</div>
            </div>
            <svg class="chev-down" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9 L12 15 L18 9"/></svg>
          </div>
        </a>
      </main>

      <div style="position:absolute;left:16px;right:16px;bottom:50px;display:flex;flex-direction:column;gap:14px;text-align:center">
        <a href="review-medication.html" class="btn btn-primary">Continue</a>
        <a href="home.html" style="color:var(--c-primary);font-weight:700">Do it later</a>
      </div>

      <div class="home-indicator"></div>
    </div>
  </div>
</body>
</html>
