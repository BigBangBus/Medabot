<svg viewBox="0 0 130 130" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="50%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#3DA7B2"/>
      <stop offset="60%" stop-color="#1F8590"/>
      <stop offset="100%" stop-color="#0E5F69"/>
    </radialGradient>
    <radialGradient id="hl" cx="35%" cy="30%" r="40%">
      <stop offset="0%" stop-color="#A5D8DE" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#A5D8DE" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- left arm -->
  <rect x="14" y="62" width="22" height="10" rx="5" fill="#1F8590"/>
  <circle cx="18" cy="67" r="7" fill="#2A99A4"/>
  <!-- right arm -->
  <rect x="94" y="62" width="22" height="10" rx="5" fill="#1F8590"/>
  <circle cx="112" cy="67" r="7" fill="#2A99A4"/>
  <!-- body -->
  <rect x="28" y="34" width="74" height="68" rx="34" fill="url(#bg)"/>
  <rect x="28" y="34" width="74" height="68" rx="34" fill="url(#hl)"/>
  <!-- ears -->
  <circle cx="30" cy="54" r="7" fill="#1F8590"/>
  <circle cx="30" cy="54" r="3" fill="#0E5F69"/>
  <circle cx="100" cy="54" r="7" fill="#1F8590"/>
  <circle cx="100" cy="54" r="3" fill="#0E5F69"/>
  <!-- antenna -->
  <line x1="65" y1="34" x2="65" y2="22" stroke="#1F8590" stroke-width="3" stroke-linecap="round"/>
  <circle cx="65" cy="20" r="4" fill="#F39D58"/>
  <!-- eyes (smiling) -->
  <path d="M48 60 q5 5 10 0" stroke="#0A2E32" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <path d="M72 60 q5 5 10 0" stroke="#0A2E32" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <!-- cross on chest -->
  <rect x="55" y="74" width="20" height="6" rx="1" fill="#0A2E32"/>
  <rect x="62" y="67" width="6" height="20" rx="1" fill="#0A2E32"/>
</svg>
