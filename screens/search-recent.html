<body>
  <div class="phone-stage">
    <div class="phone">

      <div class="status-bar">
        <span class="time">9:41</span>

        </div>

      <div class="screen-scroll">

        <h1>Search</h1>

        <div class="search-input">

        <a href="register-photograph.html" class="option-card">

          <div class="o-body">
            <div class="name">Photograph packaging</div>
            <div class="sub">Automatically identifies the label</div>
          </div>
          <svg class="chev" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6 L15 12 L9 18"/></svg>
        </a>

        <h2 class="search-recent-title">Recent</h2>

        <a href="medicine-details.html" class="recent-item" style="text-decoration:none">

            <div class="name">Jardiance 100mg</div>
            <div class="sub">Pill</div>
          </div>
          <svg class="chev" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6 L15 12 L9 18"/></svg>
        </a>

        <a href="medicine-details.html" class="recent-item" style="text-decoration:none">

            <div class="name">Jardiance 100mg</div>
            <div class="sub">Pill</div>
          </div>
          <svg class="chev" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6 L15 12 L9 18"/></svg>
