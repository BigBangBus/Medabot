<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Home – MedaBot</title>
  <link rel="stylesheet" href="../css/tokens.css" />
  <link rel="stylesheet" href="../css/components.css" />
  <link rel="stylesheet" href="../css/home.css" />
</head>
<body>
  <div class="phone-stage">
    <div class="phone">

      <div class="status-bar">
        <span class="time">9:41</span>
        <div class="levels">
          <svg viewBox="0 0 19 12" fill="currentColor"><rect x="0" y="7" width="3" height="5" rx="1"/><rect x="4.5" y="5" width="3" height="7" rx="1"/><rect x="9" y="3" width="3" height="9" rx="1"/><rect x="13.5" y="0" width="3" height="12" rx="1"/></svg>
          <svg viewBox="0 0 17 12" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M0.5 4.5 a12 12 0 0 1 16 0"/><path d="M3 7 a8 8 0 0 1 11 0"/><path d="M5.5 9.5 a4 4 0 0 1 6 0"/><circle cx="8.5" cy="11" r="1" fill="currentColor"/></svg>
          <svg viewBox="0 0 27 13" fill="none" stroke="currentColor"><rect x="0.5" y="0.5" width="22" height="12" rx="3"/><rect x="2" y="2" width="19" height="9" rx="1.5" fill="currentColor"/><rect x="23.5" y="4" width="2.5" height="5" rx="1" fill="currentColor"/></svg>
        </div>
      </div>

      <div class="screen-scroll">

      <!-- Greeting + bell -->
      <header class="home-header">
        <div class="greet">
          <div class="avatar"><img src="../assets/User.png" alt=""></div>
          <div>
            <span class="hi">Hi,&nbsp;</span><span class="user">User <svg class="chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9 L12 15 L18 9"/></svg></span>
          </div>
        </div>
        <button class="bell" aria-label="notifications">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 16 v-5 a6 6 0 0 0-12 0 v5 l-2 2 v1 h16 v-1 l-2-2 Z"/><path d="M10 21 a2 2 0 0 0 4 0"/></svg>
        </button>
      </header>

      <!-- Calendar -->
      <section class="cal-card">
        <div class="cal-head">Today, 29th January</div>
        <div class="week">
          <div class="day"><span class="letter">W</span><span class="num">26</span><span class="dot done"></span></div>
          <div class="day"><span class="letter">T</span><span class="num">27</span><span class="dot done"></span></div>
          <div class="day"><span class="letter">W</span><span class="num">28</span><span class="dot missed"></span></div>
          <div class="day is-today"><span class="letter">T</span><span class="num">29</span><span class="dot"></span></div>
          <div class="day"><span class="letter">F</span><span class="num">30</span><span class="dot"></span></div>
          <div class="day"><span class="letter">S</span><span class="num">31</span><span class="dot"></span></div>
          <div class="day"><span class="letter">S</span><span class="num">1</span><span class="dot"></span></div>
        </div>
        <div class="progress-line"></div>
      </section>

      <h2 class="today-title">Today's medication</h2>

      <a href="register-photograph.html" class="btn btn-primary register-cta">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M12 5 V19 M5 12 H19"/></svg>
        Register Medicine
      </a>

      <!-- Dose card 1 -->
      <article class="dose-progress" onclick="window.location='dose-details.html'">
        <div class="top">
          <div class="pill-ico">
            <img src="../assets/Pill-aspirine-3.png" alt="" class="pill-photo">
          </div>
          <div style="flex:1;min-width:0">
            <div class="name">Jardiance 25mg</div>
            <div class="form">Pill</div>
          </div>
          <div class="ring">
            <svg viewBox="0 0 40 40">
              <circle cx="20" cy="20" r="16" fill="none" stroke="#E0E0E0" stroke-width="3"/>
              <circle cx="20" cy="20" r="16" fill="none" stroke="var(--c-primary)" stroke-width="3"
                      stroke-dasharray="50.3 100.6" stroke-linecap="round" transform="rotate(-90 20 20)"/>
              <circle cx="20" cy="20" r="4" fill="var(--c-primary)"/>
            </svg>
          </div>
        </div>
        <div class="meta-row"><span>Doses of the day</span><span>1/2</span></div>
        <div class="bar"><span></span></div>
      </article>

      <!-- Dose card 2 (complete) -->
      <article class="dose-progress complete" onclick="window.location='dose-details.html'">
        <div class="top">
          <div class="pill-ico">
            <img src="../assets/Pill-aspirine-3.png" alt="" class="pill-photo">
          </div>
          <div style="flex:1;min-width:0">
            <div class="name">Metformina 850 mg</div>
            <div class="form">Pill</div>
          </div>
          <div class="ring">
            <svg viewBox="0 0 40 40">
              <circle cx="20" cy="20" r="16" fill="var(--c-primary)"/>
              <path d="M14 20 l4 4 l8-9" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
        </div>
        <div class="meta-row"><span>Doses of the day</span><span>Completed</span></div>
        <div class="bar"><span></span></div>
      </article>

      <!-- Overall day progress -->
      <section class="day-progress">
        <div class="row"><span class="label">Doses of the day</span><span class="count">1/3</span></div>
        <div class="bar"><span></span></div>
      </section>

      <!-- Tab bar -->
      <nav class="tab-bar">
        <a href="home.html" class="is-active">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M3 10 H21 M8 3 V7 M16 3 V7"/></svg>
          Calendar
        </a>
        <a href="medicine-list.html">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="5" y="3" width="14" height="18" rx="3"/><path d="M5 12 H19"/></svg>
          Medicine
        </a>
        <a href="search.html">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21 L16 16"/></svg>
          Search
        </a>
        <a href="chat-account.html">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6 a2 2 0 0 1 2-2 h12 a2 2 0 0 1 2 2 v9 a2 2 0 0 1-2 2 h-7 l-5 4 v-4 H6 a2 2 0 0 1-2-2 Z"/></svg>
          Chat
        </a>
      </nav>
      </div>

      <div class="home-indicator"></div>
    </div>
  </div>
</body>
</html>
