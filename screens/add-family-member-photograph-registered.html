<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Add family – Photograph Registered – MedaBot</title>
  <link rel="stylesheet" href="../css/tokens.css" />
  <link rel="stylesheet" href="../css/components.css" />
  <link rel="stylesheet" href="../css/register-medication.css" />
</head>
<body>
  <div class="phone-stage">
    <div class="phone">
      <div class="camera" style="filter: brightness(0.65);">
        <div class="camera-boxes" style="bottom:42%">
          <div class="box jardiance"><div class="label">Jardiance</div><div class="dose-band">25 mg</div><div class="scientific">Empagliflozina</div><div class="footer-mini"><span>Boehringer</span><span style="color:#E63946;font-style:italic">Lilly</span></div></div>
          <div class="box metformina"><div class="dose-band">850 mg</div><div class="scientific">Clorhidrato de Metformina</div><div class="footer-mini">30 Comprimidos</div></div>
        </div>
      </div>

      <div class="status-bar" style="color:#fff">
        <span class="time">9:41</span>
        <div class="levels"><svg viewBox="0 0 19 12" fill="currentColor"><rect x="0" y="7" width="3" height="5" rx="1"/><rect x="4.5" y="5" width="3" height="7" rx="1"/><rect x="9" y="3" width="3" height="9" rx="1"/><rect x="13.5" y="0" width="3" height="12" rx="1"/></svg><svg viewBox="0 0 17 12" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M0.5 4.5 a12 12 0 0 1 16 0"/><path d="M3 7 a8 8 0 0 1 11 0"/><path d="M5.5 9.5 a4 4 0 0 1 6 0"/><circle cx="8.5" cy="11" r="1" fill="currentColor"/></svg><svg viewBox="0 0 27 13" fill="none" stroke="currentColor"><rect x="0.5" y="0.5" width="22" height="12" rx="3"/><rect x="2" y="2" width="19" height="9" rx="1.5" fill="currentColor"/><rect x="23.5" y="4" width="2.5" height="5" rx="1" fill="currentColor"/></svg></div>
      </div>

      <div class="top-bar"><a href="add-family-member-photograph-detected.html" class="back-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18 L9 12 L15 6"/></svg></a></div>

      <div class="detected-carousel" style="bottom:90px">
        <div class="detected-dots"><span class="active"></span><span></span></div>
        <div class="detect-card-row">
          <div class="detect-card with-schedule">
            <div class="top"><div class="pill-ico"><img src="../assets/Pill-aspirine-3.png" alt="" class="pill-photo"></div><div class="name">Jardiance 25mg</div></div>
            <div class="freq"><strong>Everyday</strong><br>08:00&nbsp;&nbsp;|&nbsp;&nbsp;16:00</div>
            <a href="add-family-member-when-taking-photograph.html" class="setup-btn">Edit Schedule</a>
          </div>
          <div class="detect-card with-schedule">
            <div class="top"><div class="pill-ico"><img src="../assets/Pill-aspirine-3.png" alt="" class="pill-photo"></div><div class="name">Metformina 850mg</div></div>
            <div class="freq"><strong>Everyday</strong><br>08:00&nbsp;&nbsp;|&nbsp;&nbsp;16:00</div>
            <a href="add-family-member-when-taking-photograph.html" class="setup-btn">Edit Schedule</a>
          </div>
        </div>
      </div>

      <a href="add-family-member-review.html" class="btn btn-primary continue-fixed">Continue</a>

      <div class="home-indicator"></div>
    </div>
  </div>
</body>
</html>
