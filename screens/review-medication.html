<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Review medication – MedaBot</title>
  <link rel="stylesheet" href="../css/tokens.css" />
  <link rel="stylesheet" href="../css/components.css" />
  <link rel="stylesheet" href="../css/register-medication.css" />
</head>
<body>
  <div class="phone-stage">
    <div class="phone">

      <div class="status-bar">
        <span class="time">9:41</span>
        <div class="levels">
          <svg viewBox="0 0 19 12" fill="currentColor"><rect x="0" y="7" width="3" height="5" rx="1"/><rect x="4.5" y="5" width="3" height="7" rx="1"/><rect x="9" y="3" width="3" height="9" rx="1"/><rect x="13.5" y="0" width="3" height="12" rx="1"/></svg>
          <svg viewBox="0 0 17 12" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M0.5 4.5 a12 12 0 0 1 16 0"/><path d="M3 7 a8 8 0 0 1 11 0"/><path d="M5.5 9.5 a4 4 0 0 1 6 0"/><circle cx="8.5" cy="11" r="1" fill="currentColor"/></svg>
          <svg viewBox="0 0 27 13" fill="none" stroke="currentColor"><rect x="0.5" y="0.5" width="22" height="12" rx="3"/><rect x="2" y="2" width="19" height="9" rx="1.5" fill="currentColor"/><rect x="23.5" y="4" width="2.5" height="5" rx="1" fill="currentColor"/></svg>
        </div>
      </div>

      <div class="screen-scroll">

      <div class="top-bar">
        <a href="register-when-taking.html" class="back-btn" aria-label="back">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18 L9 12 L15 6"/></svg>
        </a>
      </div>

      <div class="progress" style="padding-bottom:14px"><span class="is-done"></span></div>

      <main class="auth" style="padding-top:0">
        <div class="tile-icon" style="background: rgba(17, 133, 150, 0.20);">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="3" fill="currentColor"/></svg>
        </div>

        <h1 style="text-align:center">Review.</h1>
        <p class="lead" style="text-align:center">Check and confirm your medication.</p>

        <div class="review-card">
          <div class="top">
            <div class="pill-ico"><img src="../assets/Pill-aspirine-3.png" alt="" class="pill-photo"></div>
            <div class="name">Jardiance 25mg</div>
          </div>
          <div class="bottom">
            <div class="freq"><strong>Everyday</strong><br>08:00  |  16:00</div>
            <div class="acts">
              <button class="edit"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 21 v-4 l13-13 l4 4 l-13 13 z"/></svg></button>
              <button class="del"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 7 H20 M10 11 V17 M14 11 V17 M6 7 L7 21 H17 L18 7 M9 7 V4 H15 V7"/></svg></button>
            </div>
          </div>
        </div>

        <div class="review-card">
          <div class="top">
            <div class="pill-ico"><img src="../assets/Pill-aspirine-3.png" alt="" class="pill-photo"></div>
            <div class="name">Metformina 850 mg</div>
          </div>
          <div class="bottom">
            <div class="freq"><strong>Everyday</strong><br>08:00  |  16:00</div>
            <div class="acts">
              <button class="edit"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 21 v-4 l13-13 l4 4 l-13 13 z"/></svg></button>
              <button class="del"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 7 H20 M10 11 V17 M14 11 V17 M6 7 L7 21 H17 L18 7 M9 7 V4 H15 V7"/></svg></button>
            </div>
          </div>
        </div>

        <a href="register-photograph.html" class="btn-outline-add">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M12 5 V19 M5 12 H19"/></svg>
          Register Medicine
        </a>
      </main>

      <a href="home.html" class="btn btn-primary" style="position:sticky;left:16px;right:16px;bottom:42px;">Continue</a>
      </div>

      <div class="home-indicator"></div>
    </div>
  </div>
</body>
</html>
