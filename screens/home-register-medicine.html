<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Home – Register Medicine sheet</title>
  <link rel="stylesheet" href="../css/tokens.css" />
  <link rel="stylesheet" href="../css/components.css" />
  <link rel="stylesheet" href="../css/home.css" />
  <link rel="stylesheet" href="../css/medicine.css" />
</head>
<body>
  <div class="phone-stage">
    <div class="phone">

      <div class="status-bar">
        <span class="time">9:41</span>
        <div class="levels">
          <svg viewBox="0 0 19 12" fill="currentColor"><rect x="0" y="7" width="3" height="5" rx="1"/><rect x="4.5" y="5" width="3" height="7" rx="1"/><rect x="9" y="3" width="3" height="9" rx="1"/><rect x="13.5" y="0" width="3" height="12" rx="1"/></svg>
          <svg viewBox="0 0 17 12" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M0.5 4.5 a12 12 0 0 1 16 0"/><path d="M3 7 a8 8 0 0 1 11 0"/><path d="M5.5 9.5 a4 4 0 0 1 6 0"/><circle cx="8.5" cy="11" r="1" fill="currentColor"/></svg>
          <svg viewBox="0 0 27 13" fill="none" stroke="currentColor"><rect x="0.5" y="0.5" width="22" height="12" rx="3"/><rect x="2" y="2" width="19" height="9" rx="1.5" fill="currentColor"/><rect x="23.5" y="4" width="2.5" height="5" rx="1" fill="currentColor"/></svg>
        </div>
      </div>

      <div class="screen-scroll">

      <!-- (Reused Home content, dimmed by overlay) -->
      <header class="home-header">
        <div class="greet">
          <div class="avatar"><img src="../assets/User.png" alt=""></div>
          <div>
            <span class="hi">Hi,&nbsp;</span><span class="user">User <svg class="chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9 L12 15 L18 9"/></svg></span>
          </div>
        </div>
        <button class="bell"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 16 v-5 a6 6 0 0 0-12 0 v5 l-2 2 v1 h16 v-1 l-2-2 Z"/><path d="M10 21 a2 2 0 0 0 4 0"/></svg></button>
      </header>

      <section class="cal-card">
        <div class="cal-head">Today, 29th January</div>
        <div class="week">
          <div class="day"><span class="letter">W</span><span class="num">26</span><span class="dot done"></span></div>
          <div class="day"><span class="letter">T</span><span class="num">27</span><span class="dot done"></span></div>
          <div class="day"><span class="letter">W</span><span class="num">28</span><span class="dot missed"></span></div>
          <div class="day is-today"><span class="letter">T</span><span class="num">29</span><span class="dot"></span></div>
          <div class="day"><span class="letter">F</span><span class="num">30</span><span class="dot"></span></div>
          <div class="day"><span class="letter">S</span><span class="num">31</span><span class="dot"></span></div>
          <div class="day"><span class="letter">S</span><span class="num">1</span><span class="dot"></span></div>
        </div>
        <div class="progress-line"></div>
      </section>

      <h2 class="today-title">Today's medication</h2>
      <a href="#" class="btn btn-primary register-cta">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M12 5 V19 M5 12 H19"/></svg>
        Register Medicine
      </a>

      <!-- Overlay -->
      <div class="home-overlay">
        <a href="home.html" class="scrim" style="position:absolute;inset:0;background:rgba(0,0,0,0.42)"></a>
        <div class="sheet">
          <div class="grab"></div>
          <h3>Register medicine</h3>
          <a href="medicine-list.html" class="opt" style="text-decoration:none">
            <div class="ic"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="5" y="3" width="14" height="18" rx="3"/><path d="M9 7 H15 M9 11 H15 M9 15 H13"/></svg></div>
            <div class="body"><div class="ttl">Pick from "List"</div><div class="sub">Pick from previously added medication</div></div>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--c-primary)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6 L15 12 L9 18"/></svg>
          </a>
          <a href="register-photograph.html" class="opt" style="text-decoration:none">
            <div class="ic"><svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M9 3 L7 5 H4 c-1.1 0-2 .9-2 2 v12 c0 1.1 .9 2 2 2 h16 c1.1 0 2-.9 2-2 V7 c0-1.1-.9-2-2-2 h-3 l-2-2 Z M12 17 a5 5 0 1 1 0-10 a5 5 0 0 1 0 10 Z"/></svg></div>
            <div class="body"><div class="ttl">Photograph packaging</div><div class="sub">Automatically identifies the label</div></div>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--c-primary)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6 L15 12 L9 18"/></svg>
          </a>
          <a href="register-manual-input.html" class="opt" style="text-decoration:none">
            <div class="ic"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 7h14 M5 12h14 M5 17h10"/></svg></div>
            <div class="body"><div class="ttl">Enter manually</div><div class="sub">Enter the medication details</div></div>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--c-primary)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6 L15 12 L9 18"/></svg>
          </a>
          <a href="home.html" class="close-btn">Close</a>
        </div>
      </div>
      </div>

      <div class="home-indicator"></div>
    </div>
  </div>
</body>
</html>
