<body>
  <div class="phone-stage">

      <div class="screen-scroll">

        <section class="hero solo">
          <div class="bot">
            <img src="../assets/Bot-2.png" alt="MedaBot" />

          <div class="dots"><span></span><span></span><span class="active"></span></div>

        <div class="ctas">
          <a href="sign-up.html"   class="btn btn-primary">Sign-Up</a>
          <a href="sign-in.html"   class="btn btn-secondary">Sign-In</a>
          <a href="chat-no-account.html" class="btn" style="background:var(--c-white);color:var(--c-primary);">Chat Without Account</a>
        </div>
      </main>
      </div>

      <div class="home-indicator"></div>
    </div>
  </div>
